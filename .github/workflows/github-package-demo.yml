name: Build, Publish & Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - .github/workflows/**
  workflow_dispatch:

jobs:
  build-publish-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          podman login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build image
        run: |
          podman build \
            -t ghcr.io/${{ github.repository }}:demo .

      - name: Push image to GHCR
        run: |
          podman push ghcr.io/${{ github.repository }}:demo

      - name: Stop old container
        run: |
          podman stop demo || true
          podman rm demo || true

      - name: Deploy container
        run: |
          podman run -d \
            --name demo \
            -p 8080:8080 \
            ghcr.io/${{ github.repository }}:demo

      - name: Verify
        run: podman ps